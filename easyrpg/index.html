<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyRPG Player - ZIP Game Loader</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <style>
    :root {
      --color-gray: hsl(0, 0%, 55%);
      --controls-size: 10vh;
    }

    @media (orientation: landscape) {
      :root {
        --controls-size: 20vh;
      }
    }

    html {
      touch-action: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      color: white;
      background: black;
    }

    /* 起動時のダイアログ用CSS */
    #startup-dialog {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .dialog-box {
      background: #222;
      padding: 2rem;
      border-radius: 8px;
      text-align: center;
      border: 1px solid var(--color-gray);
      max-width: 80%;
    }

    .dialog-box h2 {
      margin-top: 0;
      color: #fff;
    }

    .dialog-box p {
      color: #ccc;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    #game-file-input {
      margin: 1.5rem 0;
      font-size: 1rem;
      color: white;
    }

    .unselectable {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #status {
      font-size: 1.2rem;
      color: #fff;
      text-shadow: 1px 1px 2px black;
      text-align: center;
      margin-top: 20px;
      position: absolute;
      width: 100%;
      z-index: 5;
    }

    #controls {
      position: relative;
      text-align: right;
      z-index: 10;
    }

    #controls button {
      -webkit-appearance: button;
      display: inline-flex;
      background: transparent;
      border: 0;
      color: white;
      font-family: inherit;
      font-size: 1em;
      line-height: inherit;
      cursor: pointer;
      padding: 0.5rem;
    }

    #controls svg {
      pointer-events: none;
    }

    #canvas {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      border: 0;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      transform: translate(-50%, -50%);
    }

    img#canvas {
      object-fit: contain;
    }

    #dpad,
    #apad {
      position: fixed;
      bottom: 1rem;
    }

    #dpad {
      left: 1rem;
    }

    #apad {
      right: 1rem;
    }

    #dpad svg {
      width: calc(2 * var(--controls-size));
      height: calc(2 * var(--controls-size));
      fill: var(--color-gray);
    }

    #dpad svg rect {
      opacity: 0.4;
    }

    #apad > * {
      width: var(--controls-size);
      height: var(--controls-size);
      background-color: var(--color-gray);
      border-radius: 50%;
    }

    #apad > :last-child {
      position: relative;
      right: var(--controls-size);
    }

    #dpad path:not(.active),
    #apad > *:not(.active) {
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <!-- 起動時のダイアログ -->
  <div id="startup-dialog">
    <div class="dialog-box">
      <h2>RPGツクール2000/2003 ゲームローダー</h2>
      <p>ゲームのZIPファイルを選択してください。</p>
      <p style="font-size: 0.85rem; color: #999;">UTF-8とShift_JISエンコーディングに対応しています。</p>
      <input type="file" id="game-file-input" accept=".zip" />
    </div>
  </div>

  <div id="controls">
    <button id="controls-fullscreen" class="unselectable">
      <svg viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg" width="25" height="25"><path d="M13.5 13.5H10m3.5 0V10m0 3.5l-4-4m.5-8h3.5m0 0V5m0-3.5l-4 4M5 1.5H1.5m0 0V5m0-3.5l4 4m-4 4.5v3.5m0 0H5m-3.5 0l4-4" stroke="currentColor"></path></svg>
    </button>
  </div>

  <div id="status">ZIPファイルを選択してください...</div>

  <div id="viewport">
    <canvas id="canvas" tabindex="-1" class="unselectable"></canvas>

    <div id="dpad" class="unselectable">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
        <path id="dpad-up" data-key="ArrowUp" d="M48,5.8C48,2.5,45.4,0,42,0H29.9C26.6,0,24,2.4,24,5.8V24h24V5.8z" />
        <path id="dpad-right" data-key="ArrowRight" d="M66.2,24H48v24h18.2c3.3,0,5.8-2.7,5.8-6V29.9C72,26.5,69.5,24,66.2,24z" />
        <path id="dpad-down" data-key="ArrowDown" d="M24,66.3c0,3.3,2.6,5.7,5.9,5.7H42c3.3,0,6-2.4,6-5.7V48H24V66.3z" />
        <path id="dpad-left" data-key="ArrowLeft" d="M5.7,24C2.4,24,0,26.5,0,29.9V42c0,3.3,2.3,6,5.7,6H24V24H5.7z" />
        <rect id="dpad-center" x="24" y="24" width="24" height="24" />
      </svg>
    </div>

    <div id="apad" class="unselectable">
      <div id="apad-escape" data-key="Escape"></div>
      <div id="apad-enter" data-key="Enter"></div>
    </div>
  </div>

<script>

// ZIP処理用のユーティリティ関数
function detectEncoding(uint8Array) {
  // Shift-JISかUTF-8かを簡易的に判定
  // 0x80-0x9F, 0xE0-0xEF あたりが Shift-JIS の2バイト文字の1バイト目
  let shift_jis_score = 0;
  let utf8_score = 0;

  for (let i = 0; i < Math.min(uint8Array.length, 1000); i++) {
    const byte = uint8Array[i];
    
    // Shift-JIS判定
    if ((byte >= 0x81 && byte <= 0x9F) || (byte >= 0xE0 && byte <= 0xEF)) {
      if (i + 1 < uint8Array.length) {
        const nextByte = uint8Array[i + 1];
        if ((nextByte >= 0x40 && nextByte <= 0x7E) || (nextByte >= 0x80 && nextByte <= 0xFC)) {
          shift_jis_score += 2;
          i++; // 2バイト文字なのでスキップ
        }
      }
    }
    
    // UTF-8判定
    if (byte >= 0xC0 && byte <= 0xDF && i + 1 < uint8Array.length) {
      utf8_score += 1;
    } else if (byte >= 0xE0 && byte <= 0xEF && i + 2 < uint8Array.length) {
      utf8_score += 1;
    }
  }

  return shift_jis_score > utf8_score ? 'shift-jis' : 'utf-8';
}

function decodeFilename(uint8Array, encoding) {
  if (encoding === 'shift-jis' && typeof TextDecoder !== 'undefined') {
    try {
      // Shift-JISデコード
      const decoder = new TextDecoder('shift-jis');
      return decoder.decode(uint8Array);
    } catch (e) {
      console.warn("Shift-JIS decoding failed, falling back to UTF-8:", e);
    }
  }
  
  // UTF-8またはフォールバック
  const decoder = new TextDecoder('utf-8');
  return decoder.decode(uint8Array);
}

// index.json生成関数（gencache.jsと同等）
function generateIndexJson(files) {
  const index = {};
  
  files.forEach(file => {
    let path = file.path;
    
    // Normalize: 小文字化
    path = path.toLowerCase();
    
    // Normalize: NFKC正規化（簡易版）
    path = path.normalize('NFKC');
    
    // 拡張子を除去（.ini, .po は除く）
    const extMatch = path.match(/\.(ini|po)$/i);
    if (!extMatch) {
      path = path.replace(/\.[^.]*$/, '');
    }
    
    index[path] = null; // gencacheと同じくnull
  });
  
  return JSON.stringify(index, null, 2);
}

// Uint8ArrayをBase64に変換（チャンク処理で大きいファイルに対応）
function uint8ArrayToBase64(bytes) {
  const CHUNK_SIZE = 0x8000; // 32KB chunks
  let binary = '';
  
  for (let i = 0; i < bytes.length; i += CHUNK_SIZE) {
    const chunk = bytes.subarray(i, Math.min(i + CHUNK_SIZE, bytes.length));
    binary += String.fromCharCode(...chunk);
  }
  
  return btoa(binary);
}

// ZIP処理
async function processZipFile(file) {
  const startupDialog = document.getElementById('startup-dialog');
  const statusDiv = document.getElementById('status');
  
  statusDiv.textContent = 'ZIPファイルを処理中...';
  
  try {
    const arrayBuffer = await file.arrayBuffer();
    
    // JSZipにdecodeFileNameオプションを追加してShift-JISに対応
    const zip = await JSZip.loadAsync(arrayBuffer, {
      decodeFileName: function(bytes) {
        // バイト配列からShift-JISまたはUTF-8をデコード
        // まず簡易判定
        let isShiftJIS = false;
        for (let i = 0; i < bytes.length; i++) {
          const b = bytes[i];
          if ((b >= 0x81 && b <= 0x9F) || (b >= 0xE0 && b <= 0xEF)) {
            isShiftJIS = true;
            break;
          }
        }
        
        if (isShiftJIS) {
          // Shift-JISデコード（簡易版）
          try {
            // TextDecoderでshift-jisをサポートしている場合
            const decoder = new TextDecoder('shift-jis');
            return decoder.decode(new Uint8Array(bytes));
          } catch (e) {
            // フォールバック: Latin1として読んでからShift-JIS文字列として扱う
            let str = '';
            for (let i = 0; i < bytes.length; i++) {
              str += String.fromCharCode(bytes[i]);
            }
            return str;
          }
        } else {
          // UTF-8
          const decoder = new TextDecoder('utf-8');
          return decoder.decode(new Uint8Array(bytes));
        }
      }
    });
    
    console.log(`ZIP loaded with ${Object.keys(zip.files).length} entries`);
    
    // ファイル抽出
    const gameFiles = [];
    
    // フォルダ構造を検出
    let rootFolder = '';
    const filePaths = Object.keys(zip.files);
    
    // 共通のルートフォルダを検出
    if (filePaths.length > 0) {
      const firstPath = filePaths[0];
      const slashIndex = firstPath.indexOf('/');
      if (slashIndex > 0) {
        const potentialRoot = firstPath.substring(0, slashIndex + 1);
        if (filePaths.every(p => p.startsWith(potentialRoot))) {
          rootFolder = potentialRoot;
          console.log(`Detected root folder: ${rootFolder}`);
        }
      }
    }
    
    for (const [filename, zipEntry] of Object.entries(zip.files)) {
      if (zipEntry.dir) continue;
      
      // ルートフォルダをスキップ
      let relativePath = filename;
      if (rootFolder && filename.startsWith(rootFolder)) {
        relativePath = filename.substring(rootFolder.length);
      }
      
      if (!relativePath) continue;
      
      const content = await zipEntry.async('uint8array');
      const base64Data = uint8ArrayToBase64(content);
      
      gameFiles.push({
        path: relativePath,
        data: base64Data
      });
      
      if (gameFiles.length <= 5 || gameFiles.length > (Object.keys(zip.files).length - 5)) {
        console.log(`Extracted: ${relativePath} (${content.length} bytes)`);
      } else if (gameFiles.length === 6) {
        console.log(`... extracting files ...`);
      }
    }
    
    // index.json生成
    const indexJsonContent = generateIndexJson(gameFiles);
    const indexJsonBase64 = uint8ArrayToBase64(new TextEncoder().encode(indexJsonContent));
    gameFiles.push({
      path: 'index.json',
      data: indexJsonBase64
    });
    
    console.log(`Total files extracted: ${gameFiles.length}`);
    
    // sessionStorageに保存
    const gameData = {
      files: gameFiles
    };
    
    sessionStorage.setItem('easyrpg_game_data', JSON.stringify(gameData));
    
    statusDiv.textContent = 'ゲームをロード中...';
    
    // ダイアログを非表示
    startupDialog.style.display = 'none';
    
    // EasyRPGを起動
    await loadEasyRPG();
    
  } catch (error) {
    console.error('Error processing ZIP:', error);
    statusDiv.textContent = 'エラー: ' + error.message;
    alert('ZIPファイルの処理中にエラーが発生しました: ' + error.message);
  }
}

// EasyRPG起動関数
async function loadEasyRPG() {
  const gameDataJson = sessionStorage.getItem('easyrpg_game_data');
  
  if (!gameDataJson) {
    console.error("No game data found in sessionStorage");
    return;
  }
  
  const gameData = JSON.parse(gameDataJson);
  
  // Base64からUint8Arrayに変換
  function base64ToUint8Array(base64) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
      bytes[i] = binary.charCodeAt(i);
    }
    return bytes;
  }
  
  // ファイルを変換
  const files = gameData.files.map(entry => ({
    path: entry.path,
    data: base64ToUint8Array(entry.data)
  }));
  
  console.log(`Preparing ${files.length} files for EasyRPG...`);
  
  // カスタムpreRun関数
  const customPreRun = function() {
    console.log("=== Custom preRun executing ===");
    
    const files = window.EASYRPG_CUSTOM_FILES;
    if (!files || files.length === 0) {
      console.error("No files in window.EASYRPG_CUSTOM_FILES");
      return;
    }
    
    console.log(`Loading ${files.length} custom game files`);
    
    // /gamesディレクトリを完全に削除
    try {
      if (this.FS.analyzePath('/games').exists) {
        // /games内のすべてのファイルとサブディレクトリを削除
        function rmrf(path) {
          try {
            const stat = this.FS.stat(path);
            if (this.FS.isDir(stat.mode)) {
              const entries = this.FS.readdir(path);
              for (const entry of entries) {
                if (entry !== '.' && entry !== '..') {
                  rmrf(path + '/' + entry);
                }
              }
              this.FS.rmdir(path);
            } else {
              this.FS.unlink(path);
            }
          } catch (e) {
            console.warn(`Could not remove ${path}:`, e);
          }
        }
        
        rmrf.call(this, '/games');
        console.log("Removed /games directory");
      }
    } catch (e) {
      console.warn("Could not remove /games:", e);
    }
    
    // ファイルをルートに書き込み
    files.forEach((file, index) => {
      try {
        const fullPath = '/' + file.path;
        const dir = fullPath.substring(0, fullPath.lastIndexOf('/'));
        
        if (dir && dir !== '/') {
          try {
            this.FS.mkdirTree(dir);
          } catch (e) {
            // すでに存在
          }
        }
        
        this.FS.writeFile(fullPath, file.data);
        
        if (index < 3 || index >= files.length - 2) {
          console.log(`Wrote: ${fullPath}`);
        } else if (index === 3) {
          console.log(`... ${files.length - 5} more files ...`);
        }
      } catch (e) {
        console.error(`Failed to write ${file.path}:`, e);
      }
    });
    
    console.log("=== Custom game files loaded ===");
  };
  
  // createEasyRpgPlayerを呼び出す前に既存のpreRunを上書き
  window.Module = window.Module || {};
  const originalPreRun = window.Module.preRun || [];
  
  window.Module.preRun = [
    customPreRun,
    ...(Array.isArray(originalPreRun) ? originalPreRun : [originalPreRun])
  ];
  
  // createEasyRpgPlayerを呼び出し
  createEasyRpgPlayer({
    game: '', // ルートディレクトリを使用
    saveFs: undefined
  }).then(function(Module) {
    console.log("EasyRPG Player initialized!");
    Module.initApi();
    canvas.focus();
  }).catch(function(error) {
    console.error("Failed to create EasyRPG Player:", error);
    document.getElementById('status').textContent = 'エラー: EasyRPGの初期化に失敗しました';
  });
}

// ページロード時の処理
window.addEventListener('load', () => {
  const fileInput = document.getElementById('game-file-input');
  const canvas = document.getElementById('canvas');
  
  // ファイル選択イベント
  fileInput.addEventListener('change', async (event) => {
    const file = event.target.files[0];
    if (file) {
      await processZipFile(file);
    }
  });
  
  // Fullscreen button
  document.querySelector('#controls-fullscreen').addEventListener('click', () => {
    const viewport = document.getElementById('viewport');
    if (viewport.requestFullscreen) {
      viewport.requestFullscreen();
    }
  });
  
  // sessionStorageにデータがある場合は自動ロード
  const gameDataJson = sessionStorage.getItem('easyrpg_game_data');
  if (gameDataJson) {
    document.getElementById('startup-dialog').style.display = 'none';
    document.getElementById('status').textContent = 'ゲームをロード中...';
    loadEasyRPG();
  }
});

</script>

<script async type="text/javascript" src="index.js"></script>

</body>
</html>
